<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 220" role="img" aria-labelledby="title desc">
  <title id="title">germanychecklist logo</title>
  <desc id="desc">Logo with Indian and German flags, graduation cap, checklist clipboard, and green tick mark.</desc>
  <defs>
    <linearGradient id="gc-panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#171d2f" />
      <stop offset="100%" stop-color="#090d18" />
    </linearGradient>
    <linearGradient id="gc-metal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f7f8fa" />
      <stop offset="100%" stop-color="#d8dde5" />
    </linearGradient>
    <linearGradient id="gc-bag" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a4352" />
      <stop offset="100%" stop-color="#111722" />
    </linearGradient>
    <linearGradient id="gc-white" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#edf2f8" />
    </linearGradient>
    <filter id="gc-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.35" />
    </filter>
    <clipPath id="gc-flag-in">
      <path d="M80 82c60 16 132-16 200 10v58c-66-18-137 15-200-8z" />
    </clipPath>
    <clipPath id="gc-flag-de">
      <path d="M360 82c68-24 132 21 204-7v67c-69 22-134-18-204 8z" />
    </clipPath>
  </defs>

